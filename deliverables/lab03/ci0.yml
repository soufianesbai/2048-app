name: CI

on:
  push:
    branches:
      - main
      - lab3
      - feature/*
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.27.0"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.27.0"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Verify build output
        run: |
          test -d .output
          test -f .output/nitro.json

      - name: Smoke test preview
        run: |
          PORT=3000 pnpm run preview &
          sleep 5
          curl -f http://localhost:3000/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuxt-build
          path: .output
